<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Details | Prado R Motors</title>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      background-image: url('images/background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
    }

    .vehicle-detail {
      background: rgba(15, 15, 15, 0.96);
      border: 1px solid rgba(255, 196, 0, 0.3);
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 0 20px rgba(255,196,0,.15);
    }

    .back-link {
      color: #ffd54a;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 30px;
    }

    .main-photo {
      width: 100%;
      height: 420px;
      object-fit: contain;
      background: linear-gradient(to bottom, #202020, #0a0a0a);
      border-radius: 12px;
    }

    .price {
      color: #ffd54a;
      font-size: 2rem;
      font-weight: bold;
      margin: 15px 0;
    }

    .info-box {
      background: #111;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
    }

    .contact-button {
      display: block;
      background: #ffd54a;
      color: #111;
      padding: 14px;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
    }

    @media (max-width: 800px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .main-photo {
        height: 300px;
        .detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 20px;
}

.detail-header h1 {
  margin: 0;
  font-size: 2rem;
}

.status-badge {
  display: inline-block;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 0.8rem;
  font-weight: bold;
  color: white;
}

.available {
  background: linear-gradient(
    135deg,
    #1e9e57,
    #28c76f
  );

  box-shadow:
    0 0 12px rgba(40,199,111,.4);
}

.pending {
  background: linear-gradient(
    135deg,
    #ff8c00,
    #ffb300
  );

  box-shadow:
    0 0 12px rgba(255,179,0,.35);
}

.sold {
  background: linear-gradient(
    135deg,
    #c62828,
    #ef5350
  );

  box-shadow:
    0 0 12px rgba(239,83,80,.35);
}

.spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}

.spec-item {
  background: #181818;
  border-radius: 8px;
  padding: 12px;
}

.spec-label {
  color: #aaa;
  font-size: 0.85rem;
}

.spec-value {
  font-weight: bold;
  margin-top: 4px;
}

.description-box {
  margin-top: 25px;
  background: #111;
  border-radius: 12px;
  padding: 18px;
  line-height: 1.5;
}
.status-container {
  display: flex;
  align-items: center;
}

.status-badge {
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: white;
}
      }
    }
  </style>

  <script src="vehicle.js" defer></script>
</head>
  
<body>
<a href="index.html" class="back-link">← Back to Inventory</a>

<div id="vehicle-detail" class="vehicle-detail">
  Loading vehicle...
</div>

</body>
</html>
