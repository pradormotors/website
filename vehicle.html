<!DOCTYPE html>
<html lang="en">
<head>
  <title>Vehicle Details | Prado R Motors</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --gold: #ffd54a;
      --gold-dark: #d6a900;
      --panel: rgba(15, 15, 15, 0.97);
      --panel-soft: #181818;
      --border: rgba(255, 196, 0, 0.25);
      --muted: #bdbdbd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 1280px;
      min-height: 100vh;
      margin: auto;
      padding: 20px;
      background-image: url('images/background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #050505;
      color: white;
    }

    .vehicle-detail {
      background: var(--panel);
      border: 1px solid rgba(255, 196, 0, 0.3);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 0 24px rgba(255, 196, 0, 0.15);
    }

    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    .stock-number {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.75rem);
      line-height: 1.1;
    }

    .price {
      color: var(--gold);
      font-size: 2.2rem;
      font-weight: bold;
      margin-top: 12px;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(300px, 0.8fr);
      gap: 28px;
      align-items: start;
    }

    .gallery {
      min-width: 0;
    }

    .photo-wrapper {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(to bottom, #202020, #080808);
    }

    .main-photo {
      display: block;
      width: 100%;
      height: 600px;
      object-fit: contain;
      cursor: zoom-in;
    }

    .main-photo:fullscreen {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    .status-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 5;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      white-space: nowrap;
    }

    .available {
      background: linear-gradient(135deg, #1e9e57, #28c76f);
      box-shadow: 0 0 12px rgba(40, 199, 111, 0.4);
    }

    .pending {
      background: linear-gradient(135deg, #ff8c00, #ffb300);
      color: #111;
      box-shadow: 0 0 12px rgba(255, 179, 0, 0.35);
    }

    .sold {
      background: linear-gradient(135deg, #c62828, #ef5350);
      box-shadow: 0 0 12px rgba(239, 83, 80, 0.35);
    }

    .gallery-arrow {
      position: absolute;
      top: 50%;
      z-index: 4;
      width: 48px;
      height: 60px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 2.4rem;
      line-height: 1;
      cursor: pointer;
      transform: translateY(-50%);
    }

    .gallery-arrow:hover {
      background: rgba(0, 0, 0, 0.9);
      color: var(--gold);
    }

    .gallery-arrow-left {
      left: 14px;
    }

    .gallery-arrow-right {
      right: 14px;
    }

    .photo-counter {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .thumbnail-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 12px;
      padding: 4px 2px 10px;
      scrollbar-color: var(--gold) #181818;
    }

    .thumbnail-button {
      flex: 0 0 110px;
      height: 76px;
      padding: 0;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 9px;
      background: #111;
      cursor: pointer;
      opacity: 0.72;
    }

    .thumbnail-button:hover,
    .thumbnail-button.active {
      border-color: var(--gold);
      opacity: 1;
    }

    .thumbnail-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info-box,
    .description-box,
    .location-box,
    .message-box {
      background: rgba(17, 17, 17, 0.96);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .info-box {
      position: sticky;
      top: 20px;
    }

    .info-box h2,
    .description-box h2,
    .location-box h2 {
      margin: 0 0 16px;
      color: var(--gold);
    }

    .spec-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .spec-item {
      min-width: 0;
      background: var(--panel-soft);
      border: 1px solid rgba(255, 196, 0, 0.16);
      border-radius: 10px;
      padding: 14px;
    }

    .financing-item {
      background: linear-gradient(135deg, var(--gold), #f0ba18);
      border-color: var(--gold);
    }

    .spec-label {
      color: #aaa;
      font-size: 0.8rem;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .financing-item .spec-label,
    .financing-value {
      color: #111;
    }

    .spec-value {
      color: white;
      font-weight: bold;
      font-size: 1rem;
      overflow-wrap: anywhere;
    }

    .title-clean {
      color: #45d67d;
    }

    .title-rebuilt {
      color: #ffb300;
    }

    .title-salvage {
      color: #ef5350;
    }

    .contact-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .contact-button {
      display: block;
      padding: 14px;
      border-radius: 9px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
    }

    .contact-button.primary {
      background: var(--gold);
      color: #111;
    }

    .contact-button.secondary {
      border: 1px solid var(--gold);
      background: #111;
      color: var(--gold);
    }

    .contact-button:hover {
      filter: brightness(1.08);
    }

    .description-box,
    .location-box {
      margin-top: 25px;
      line-height: 1.65;
    }

    .description-box p,
    .location-box p {
      margin: 0 0 14px;
      color: #e8e8e8;
    }

    .description-box p:last-child,
    .location-box p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 920px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .info-box {
        position: static;
      }

      .main-photo {
        height: 480px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .vehicle-detail {
        padding: 16px;
      }

      .main-photo {
        height: 330px;
      }

      .gallery-arrow {
        width: 42px;
        height: 54px;
      }

      .spec-grid {
        grid-template-columns: 1fr;
      }

      .thumbnail-button {
        flex-basis: 88px;
        height: 64px;
      }
    }
  </style>

  <script src="vehicle.js" defer></script>
</head>

<body>
  <a href="index.html" class="back-link">← Back to Inventory</a>

  <main id="vehicle-detail" class="vehicle-detail">
    Loading vehicle...
  </main>
</body>
</html>

</body>
</html>
