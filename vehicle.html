<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Details | Prado R Motors</title>
  <meta charset="UTF-8">

 <style>
body {
  font-family: Arial, sans-serif;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  background-image: url('images/background.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-color: #050505;
  color: white;
}

.vehicle-detail {
  background: rgba(15, 15, 15, 0.96);
  border: 1px solid rgba(255, 196, 0, 0.3);
  border-radius: 14px;
  padding: 25px;
  box-shadow: 0 0 20px rgba(255,196,0,.15);
}

.back-link {
  color: #ffd54a;
  text-decoration: none;
  font-weight: bold;
  display: inline-block;
  margin-bottom: 20px;
}

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 20px;
}

.detail-layout {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 30px;
}

.main-photo {
  width: 100%;
  height: 550px;

  object-fit: contain;

  background: linear-gradient(
    to bottom,
    #202020,
    #0a0a0a
  );

  border-radius: 12px;
}
.photo-wrapper {
  position: relative;
}
.price {
  color: #ffd54a;
  font-size: 2rem;
  font-weight: bold;
  margin: 15px 0;
}

   .title-clean {
  color: #28c76f;
  font-weight: bold;
}

.title-rebuilt {
  color: #ffb300;
  font-weight: bold;
}

.title-salvage {
  color: #ef5350;
  font-weight: bold;
}

.info-box {
  background: #111;
  border-radius: 12px;
  padding: 18px;
  margin-top: 15px;
}

.status-container {
  display: flex;
  align-items: center;
}

.status-badge {
  position: absolute;
  top: 15px;
  left: 15px;
  z-index: 10;

  display: inline-block;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: white;
  white-space: nowrap;
}

.available {
  background: linear-gradient(135deg, #1e9e57, #28c76f);
  box-shadow: 0 0 12px rgba(40,199,111,.4);
}

.pending {
  background: linear-gradient(135deg, #ff8c00, #ffb300);
  box-shadow: 0 0 12px rgba(255,179,0,.35);
}

.sold {
  background: linear-gradient(135deg, #c62828, #ef5350);
  box-shadow: 0 0 12px rgba(239,83,80,.35);
}

.spec-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.spec-item {
  background: #181818;
  border: 1px solid rgba(255, 196, 0, 0.18);
  border-radius: 10px;
  padding: 14px;
}

.spec-label {
  color: #aaa;
  font-size: 0.85rem;
  margin-bottom: 5px;
}

.spec-value {
  color: white;
  font-weight: bold;
  font-size: 1rem;
  white-space: nowrap;
}

.contact-button {
  display: block;
  background: #ffd54a;
  color: #111;
  padding: 14px;
  border-radius: 8px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
  margin-top: 20px;
}

.description-box {
  margin-top: 25px;
  background: rgba(17,17,17,.95);
  border: 1px solid rgba(255, 196, 0, 0.18);
  border-radius: 12px;
  padding: 18px;
  line-height: 1.5;
}

@media (max-width: 800px) {
  .detail-layout {
    grid-template-columns: 1fr;
  }

  .detail-header {
    flex-direction: column;
  }

  .main-photo {
    height: 300px;
  }

  .spec-grid {
    grid-template-columns: 1fr;
  }
}
</style>

  <script src="vehicle.js" defer></script>
</head>
  
<body>
<a href="index.html" class="back-link">← Back to Inventory</a>

<div id="vehicle-detail" class="vehicle-detail">
  Loading vehicle...
</div>

</body>
</html>
