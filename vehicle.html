<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Details | Prado R Motors</title>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      background-image: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
    }

    .vehicle-detail {
      background: rgba(15, 15, 15, 0.96);
      border: 1px solid rgba(255, 196, 0, 0.3);
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 0 20px rgba(255,196,0,.15);
    }

    .back-link {
      color: #ffd54a;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 30px;
    }

    .main-photo {
      width: 100%;
      height: 420px;
      object-fit: contain;
      background: linear-gradient(to bottom, #202020, #0a0a0a);
      border-radius: 12px;
    }

    .price {
      color: #ffd54a;
      font-size: 2rem;
      font-weight: bold;
      margin: 15px 0;
    }

    .info-box {
      background: #111;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
    }

    .contact-button {
      display: block;
      background: #ffd54a;
      color: #111;
      padding: 14px;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
    }

    @media (max-width: 800px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .main-photo {
        height: 300px;
      }
    }
  </style>

  <script src="vehicle.js" defer></script>
</head>
  
<body>
<script>
  alert("inline script works");
</script>
<a href="index.html" class="back-link">← Back to Inventory</a>

<div id="vehicle-detail" class="vehicle-detail">
  Loading vehicle...
</div>

</body>
</html>
