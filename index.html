<!DOCTYPE html>
<html>
<head>
  <title>Prado R Motors</title>
  <meta charset="UTF-8">
 <style>
body {
  font-family: Arial, sans-serif;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

#inventory {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
}

.vehicle-image-wrapper {
  position: relative;
  background-color: #f4f4f4;
}

.vehicle-image-wrapper .badge {
  position: absolute;
  top: 12px;
  left: 12px;
}
.vehicle-card {
  border: 1px solid #ddd;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  background: white;
}

.vehicle-photo {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background-color: #f4f4f4;
}

.vehicle-info {
  padding: 15px;
}

.vehicle-title {
  margin: 0;
  font-size: 1.3rem;
}

.vehicle-price {
  font-size: 1.5rem;
  font-weight: bold;
  margin-top: 10px;
}

.vehicle-miles {
  color: #666;
}
   .badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: bold;
  color: white;
  margin-bottom: 10px;
}

.available {
  background-color: #28a745;
}

.pending {
  background-color: #ff9800;
}

.sold {
  background-color: #dc3545;
}
</style>
</head>
  
<script src="inventory.js"></script>
<body>

<h1>Prado R Motors</h1>

<p>Quality Used Cars in McAllen, TX</p>

<h2>Featured Vehicles</h2>

<div id="inventory"></div>

<p>
Call: +1 (956) 278-5472
</p>

<p>
Email: pradormotors@gmail.com
</p>

</body>
</html>
