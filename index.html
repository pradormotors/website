<!DOCTYPE html>
<html>
<head>
  <title>Prado R Motors</title>
  <meta charset="UTF-8">
 <style>
body {
  font-family: Arial, sans-serif;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

#inventory {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
}
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  color: white;
  padding: 24px;
  border-radius: 14px;
  margin-bottom: 30px;
  gap: 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  background: white;
  border-radius: 12px;
  padding: 6px;
}

.site-header h1 {
  margin: 0;
  font-size: 2rem;
}

.site-header p {
  margin: 5px 0 0;
  color: #ddd;
}

.header-contact {
  text-align: right;
}
.vehicle-image-wrapper {
  position: relative;
  background-color: #f4f4f4;
}

.vehicle-image-wrapper .badge {
  position: absolute;
  top: 12px;
  left: 12px;
}
.vehicle-card {
  border: 1px solid #ddd;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  background: white;
}

.vehicle-photo {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background-color: #f4f4f4;
}

.vehicle-info {
  padding: 18px;
}

.vehicle-title {
  margin: 0 0 8px;
  font-size: 1.25rem;
}

.vehicle-price {
  font-size: 1.6rem;
  font-weight: bold;
  margin: 8px 0;
}

.vehicle-miles,
.vehicle-stock {
  color: #666;
  margin: 6px 0;
}

.vehicle-card {
  text-decoration: none;
  color: inherit;
}

.vehicle-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 18px rgba(0,0,0,.18);
}

.finance-badge {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #f1f1f1;
  font-size: 0.85rem;
  font-weight: bold;
}

.view-button {
  display: block;
  margin-top: 16px;
  padding: 12px;
  text-align: center;
  background: #111;
  color: white;
  border-radius: 8px;
  font-weight: bold;
}

   .hero {
  background: linear-gradient(135deg, #222, #555);
  color: white;
  padding: 50px 25px;
  border-radius: 14px;
  text-align: center;
  margin-bottom: 35px;
}

.hero h2 {
  font-size: 2.2rem;
  margin: 0 0 12px;
}

.hero p {
  font-size: 1.1rem;
  color: #eee;
  margin-bottom: 24px;
}

.hero-button {
  display: inline-block;
  background: white;
  color: #111;
  padding: 12px 22px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
}
   .badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: bold;
  color: white;
  margin-bottom: 10px;
}

.available {
  background-color: #28a745;
}

.pending {
  background-color: #ff9800;
}

.sold {
  background-color: #dc3545;
}
  
</style>
</head>
  
<script src="inventory.js"></script>
<body>

<header class="site-header">
  <div class="brand">
    <img src="images/prado-logo.jpg" alt="Prado R Motors Logo" class="logo">

    <div>
      <h1>Prado R Motors</h1>
      <p>Quality Used Cars in McAllen, TX</p>
    </div>
  </div>

  <div class="header-contact">
    <strong>Call: +1 (956) 278-5472</strong><br>
    <span>pradormotors@gmail.com</span>
  </div>
</header>

<section class="hero">
  <h2>Reliable Used Cars in McAllen, TX</h2>
  <p>Quality vehicles, simple buying process, and financing options available.</p>
  <a href="#inventory" class="hero-button">Browse Inventory</a>
</section>
  
<h2>Featured Vehicles</h2>

<div id="inventory"></div>

<p>
Call: +1 (956) 278-5472
</p>

<p>
Email: pradormotors@gmail.com
</p>

</body>
</html>
